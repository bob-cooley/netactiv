<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#070707"/>
      <stop offset="55%"  stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>

    <radialGradient id="atmosphericGlow" cx="28%" cy="38%" r="52%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1d1d1d" stop-opacity="1"/>
      <stop offset="100%" stop-color="#070707" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>

    <!-- Fine 60px grid -->
    <pattern id="finegrid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#c0c0c0" stroke-width="0.35"/>
    </pattern>

    <!-- Major 240px grid -->
    <pattern id="majorgrid" x="0" y="0" width="240" height="240" patternUnits="userSpaceOnUse">
      <path d="M 240 0 L 0 0 0 240" fill="none" stroke="#c0c0c0" stroke-width="0.7"/>
    </pattern>

  </defs>

  <!-- ── Base ── -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <rect width="1920" height="1080" fill="url(#atmosphericGlow)" opacity="0.55"/>

  <!-- ── Grids ── -->
  <rect width="1920" height="1080" fill="url(#finegrid)"  opacity="0.055"/>
  <rect width="1920" height="1080" fill="url(#majorgrid)" opacity="0.11"/>

  <!-- ── Structural panels (translucent, grid-aligned) ── -->
  <!-- Primary panel: upper-right quadrant -->
  <rect x="840"  y="60"  width="720" height="480"
        fill="#1c1c1c" fill-opacity="0.22"
        stroke="#787878" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Inset layer, offset, creates depth -->
  <rect x="900"  y="120" width="600" height="360"
        fill="#202020" fill-opacity="0.14"
        stroke="#909090" stroke-width="0.4" stroke-opacity="0.14"/>
  <!-- Tertiary inner layer -->
  <rect x="960"  y="180" width="480" height="240"
        fill="#242424" fill-opacity="0.08"
        stroke="#a0a0a0" stroke-width="0.3" stroke-opacity="0.10"/>

  <!-- Secondary panel: lower-left -->
  <rect x="120"  y="600" width="480" height="360"
        fill="#181818" fill-opacity="0.28"
        stroke="#686868" stroke-width="0.5" stroke-opacity="0.16"/>
  <rect x="180"  y="660" width="360" height="240"
        fill="#1c1c1c" fill-opacity="0.14"
        stroke="#808080" stroke-width="0.4" stroke-opacity="0.12"/>

  <!-- Vertical panel: far right, suggests a sidebar/column structure -->
  <rect x="1620" y="180" width="240" height="660"
        fill="#161616" fill-opacity="0.2"
        stroke="#666666" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Subtle horizontal data-layer lines -->
  <line x1="0" y1="360" x2="1920" y2="360" stroke="#a0a0a0" stroke-width="0.4" opacity="0.09"/>
  <line x1="0" y1="720" x2="1920" y2="720" stroke="#a0a0a0" stroke-width="0.4" opacity="0.09"/>
  <!-- Tertiary horizontals (half-pitch) -->
  <line x1="840" y1="540" x2="1920" y2="540" stroke="#888888" stroke-width="0.3" opacity="0.07"/>

  <!-- ── Connection lines ── -->
  <!-- Primary network (slightly more visible) -->
  <g stroke="#b0b0b0" stroke-width="0.7" opacity="0.22" fill="none">
    <!-- Upper cluster -->
    <line x1="960"  y1="180" x2="1080" y2="240"/>
    <line x1="960"  y1="180" x2="900"  y2="300"/>
    <line x1="1080" y1="240" x2="1020" y2="300"/>
    <line x1="900"  y1="300" x2="1020" y2="300"/>
    <!-- Long structural cross-lines -->
    <line x1="1020" y1="300" x2="1380" y2="600"/>
    <line x1="960"  y1="180" x2="300"  y2="420"/>
    <!-- Lower-right cluster -->
    <line x1="1380" y1="600" x2="1440" y2="660"/>
    <line x1="1380" y1="600" x2="1320" y2="660"/>
    <line x1="1440" y1="660" x2="1500" y2="720"/>
    <line x1="1320" y1="660" x2="1440" y2="660"/>
    <!-- Left sparse chain -->
    <line x1="300"  y1="420" x2="420"  y2="480"/>
    <line x1="420"  y1="480" x2="660"  y2="780"/>
  </g>

  <!-- Secondary network (very faint, long-range) -->
  <g stroke="#888888" stroke-width="0.4" opacity="0.10" fill="none">
    <line x1="960"  y1="180" x2="1680" y2="300"/>
    <line x1="1680" y1="300" x2="1440" y2="660"/>
    <line x1="660"  y1="780" x2="1320" y2="660"/>
    <line x1="300"  y1="420" x2="60"   y2="360"/>
    <line x1="1680" y1="300" x2="1920" y2="240"/>
  </g>

  <!-- ── Nodes ── -->
  <g fill="#b8b8b8">
    <!-- Upper cluster -->
    <circle cx="960"  cy="180" r="3.0" opacity="0.60"/>
    <circle cx="1080" cy="240" r="2.0" opacity="0.48"/>
    <circle cx="900"  cy="300" r="2.0" opacity="0.44"/>
    <circle cx="1020" cy="300" r="2.5" opacity="0.52"/>

    <!-- Left chain -->
    <circle cx="300"  cy="420" r="2.0" opacity="0.40"/>
    <circle cx="420"  cy="480" r="1.5" opacity="0.34"/>
    <circle cx="660"  cy="780" r="2.0" opacity="0.38"/>

    <!-- Lower-right cluster -->
    <circle cx="1380" cy="600" r="3.0" opacity="0.55"/>
    <circle cx="1440" cy="660" r="2.5" opacity="0.48"/>
    <circle cx="1320" cy="660" r="2.0" opacity="0.40"/>
    <circle cx="1500" cy="720" r="1.5" opacity="0.34"/>

    <!-- Isolated / edge nodes -->
    <circle cx="1680" cy="300" r="2.0" opacity="0.38"/>
    <circle cx="60"   cy="360" r="1.5" opacity="0.24"/>
  </g>

  <!-- ── Red accent ── (one node: the convergence point, the decision node) -->
  <circle cx="1020" cy="300" r="2.8" fill="#c41230" opacity="0.80"/>
  <circle cx="1020" cy="300" r="7"   fill="none" stroke="#c41230" stroke-width="0.5" opacity="0.28"/>
  <circle cx="1020" cy="300" r="14"  fill="none" stroke="#c41230" stroke-width="0.3" opacity="0.11"/>

  <!-- ── Vignette ── -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>

</svg>
