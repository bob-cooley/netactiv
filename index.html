<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>netActiv — Strategy. Design. Technology. Intelligence.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #070707;
      min-height: 100vh;
    }

    #neural-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
    }

    .grid {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .logo img {
      width: 426px;
      max-width: 90vw;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="neural-bg"></canvas>
  <div class="grid">
    <div class="logo">
      <img src="art/na-logo-long.svg" alt="netActiv">
    </div>
  </div>
  <script src="neural-bg.js"></script>
</body>
</html>
