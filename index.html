<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>netActiv — Strategy. Design. Technology. Intelligence.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #070707;
      min-height: 100vh;
    }

    #neural-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
    }

    /* Outer wrapper — centers everything, logo sits above the frame */
    .page {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 0;
    }

    .logo {
      padding-bottom: 32px;
    }

    .logo img {
      width: 426px;
      max-width: 90vw;
      display: block;
    }

    /* The framed content area — starts below the logo */
    .content-frame {
      border: 1px solid rgba(180, 180, 180, 0.35);
      padding: 40px;
    }

    footer {
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #666666;
      letter-spacing: 0.03em;
      text-align: center;
      padding: 10px 0 24px;
    }
  </style>
</head>
<body>
  <canvas id="neural-bg"></canvas>
  <div class="page">
    <div class="logo">
      <img src="art/na-logo-long.svg" alt="netActiv">
    </div>
    <div class="content-frame">

      <!-- placeholder space -->
      <br><br><br><br><br><br><br><br><br><br>
      <br><br><br><br><br><br><br>

    </div>
    <footer>&copy; 2026 netActiv</footer>
  </div>
  <script src="neural-bg.js"></script>
</body>
</html>
